<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hackathon Toolkit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>HackAdmin</h2>
        <nav>
            <p>Dashboard Tools</p>
        </nav>
    </div>

    <main class="content">
        <h3>Team Management</h3>
        <div class="input-group">
            <input type="text" id="teamName" placeholder="Team Name">
            <input type="url" id="link" placeholder="GitHub URL">
            <button onclick="addTeam()">Add Team</button>
        </div>

        <table id="teamTable">
            <thead>
                <tr>
                    <th>Team</th>
                    <th>Link</th>
                    <th>Status</th>
                    <th>Rating</th>
                    <th>Comments</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="teamBody"></tbody>
        </table>
    </main>

    <script src="script.js"></script>
</body>
</html>
